<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwiftGuard Admin Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: #ffffff; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 30px; border-bottom: 2px solid #333; padding-bottom: 10px; }
        .panel { background-color: #1e1e1e; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        h2 { margin-top: 0; color: #4DA8DA; }
        .form-group { margin-bottom: 15px; }
        input { width: 100%; padding: 10px; margin-top: 5px; background-color: #2c2c2c; border: 1px solid #444; color: white; border-radius: 4px; box-sizing: border-box;}
        button { background-color: #4DA8DA; color: #121212; border: none; padding: 10px 20px; font-weight: bold; border-radius: 4px; cursor: pointer; width: 100%; }
        button:hover { background-color: #3b8bb8; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #333; }
        th { background-color: #2c2c2c; }
        .status-PENDING { color: #f39c12; font-weight: bold; }
        .status-APPROVED { color: #2ecc71; font-weight: bold; }
        .status-FLAGGED_FOR_REVIEW { color: #e74c3c; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🛡️ SwiftGuard Live Dashboard</h1>
        </div>

        <div class="panel">
            <h2>Simulator: Inject Transaction</h2>
            <form id="txForm">
                <div class="form-group">
                    <label>User ID</label>
                    <input type="text" id="userId" placeholder="e.g., user_999" required>
                </div>
                <div class="form-group">
                    <label>Amount ($)</label>
                    <input type="number" id="amount" placeholder="e.g., 6000" required>
                </div>
                <div class="form-group">
                    <label>Location</label>
                    <input type="text" id="location" placeholder="e.g., Bengaluru" required>
                </div>
                <button type="submit">Submit to Gateway</button>
            </form>
        </div>

        <div class="panel">
            <h2>Live Monitor (Auto-updates every 3s)</h2>
            <table id="txTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>User</th>
                        <th>Amount</th>
                        <th>Location</th>
                        <th>Risk Score</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        // 1. Handle Form Submission
        document.getElementById('txForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                userId: document.getElementById('userId').value,
                amount: Number(document.getElementById('amount').value),
                location: document.getElementById('location').value
            };

            await fetch('http://localhost:3000/api/transactions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            
            document.getElementById('txForm').reset();
            fetchTransactions(); // Instantly update table
        });

        // 2. Fetch and Display Transactions
        async function fetchTransactions() {
            try {
                const response = await fetch('http://localhost:3000/api/transactions');
                const transactions = await response.json();
                
                const tbody = document.getElementById('tableBody');
                tbody.innerHTML = ''; // Clear old data

                transactions.forEach(tx => {
                    const row = `<tr>
                        <td style="font-size: 0.8em; color: #888;">${tx._id}</td>
                        <td>${tx.userId}</td>
                        <td>$${tx.amount}</td>
                        <td>${tx.location}</td>
                        <td>${tx.riskScore}</td>
                        <td class="status-${tx.status}">${tx.status.replace(/_/g, ' ')}</td>
                    </tr>`;
                    tbody.innerHTML += row;
                });
            } catch (error) {
                console.error("Error fetching data:", error);
            }
        }

        fetchTransactions();
        setInterval(fetchTransactions, 3000); // Ping every 3 seconds
    </script>
</body>
</html>
